[build]
  # Commande de build (navigation explicite vers le frontend)
  command = "cd stagecomplete-frontend && npm ci && npm run build"

  # Répertoire de sortie après build
  publish = "stagecomplete-frontend/dist"

# Configuration pour SPA (Single Page Application)
# Exclure les assets de la redirection SPA
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# Redirection SPA pour toutes les autres routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers pour optimiser les performances
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Variables d'environnement pour la production
[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"
  GENERATE_SOURCEMAP = "false"
  # Variables Vite par défaut si non définies
  VITE_APP_NAME = "StageComplete"
  VITE_APP_VERSION = "0.1.0"
  VITE_NODE_ENV = "production"